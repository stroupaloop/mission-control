name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    # Fork-only guard — FORK.md section 3 requires .github/workflows/
    # files to gate on this so an upstream rebase that pulls these
    # files into the upstream repo (an unlikely but accounted-for
    # case) doesn't cause this workflow to run there. Pre-existing
    # gap on this workflow; closed alongside the PR that touches it.
    if: github.repository == 'stroupaloop/mission-control'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Configure git identity
        run: |
          git config --global user.email "ci@mission-control.dev"
          git config --global user.name "CI"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: API contract parity
        run: pnpm api:parity

      - name: IAM coverage (fleet handlers)
        run: pnpm iam:coverage

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Prepare E2E environment
        run: cp .env.test .env

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E tests
        run: pnpm test:e2e
