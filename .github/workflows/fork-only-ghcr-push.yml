name: fork-only-ghcr-push

# Builds and pushes the Mission Control Docker image to GHCR on merges to
# the fork's main branch, and on pushes to feat/* branches for iterative
# testing of AWS deployment.
#
# The `if: github.repository` guard makes this a no-op in the unlikely event
# this file ever reaches `builderz-labs/mission-control` (it shouldn't —
# see FORK.md).

on:
  push:
    branches:
      - main
      - 'feat/**'
  workflow_dispatch:

jobs:
  build-and-push:
    # Fork-only guard — see FORK.md rule #3
    if: github.repository == 'stroupaloop/mission-control'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # write:packages scope for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_SLUG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/stroupaloop/mission-control:${{ steps.tags.outputs.branch_slug }}
            ghcr.io/stroupaloop/mission-control:${{ steps.tags.outputs.branch_slug }}-${{ steps.tags.outputs.short_sha }}
            ${{ github.ref == 'refs/heads/main' && 'ghcr.io/stroupaloop/mission-control:latest' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
