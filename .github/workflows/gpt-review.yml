name: GPT-5.5 PR Review (pr-agent)

# Independent GPT-5.5 review via Codium pr-agent. Runs alongside Claude Code
# Review and Greptile — three independent perspectives. Deliberately broad
# instructions so this is a true second opinion, not a duplicate of Claude's lens.
#
# Fork-only: requires PR_AGENT_OPENAI_API_KEY in repo secrets.
#
# Manual triggers: comment `/review`, `/describe`, `/ask <question>`, or
# `/improve` on a PR to re-run pr-agent. See https://github.com/Codium-ai/pr-agent.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]  # don't fire on edit/delete

# Cancel in-flight runs on rapid pushes / repeated `/review` comments.
# Falls back to the issue/run id when there's no PR number on the event.
concurrency:
  group: gpt-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    name: GPT-5.5 Code Review
    # Two-layer guard:
    # - pull_request: skip PRs from forks-of-fork (secrets aren't exposed there)
    # - issue_comment: must be (a) on a PR, (b) a slash command (pr-agent's only
    #   recognized inputs), AND (c) from a trusted association so external
    #   contributors can't burn API quota or expose this secret-bearing
    #   workflow to untrusted prompt injection by commenting on a fork PR.
    if: >
      github.repository == 'stroupaloop/mission-control' &&
      ((github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository) ||
       (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run pr-agent (GPT-5.5)
        # Pinned to SHA of v0.34 — `@main` runs whatever is on the upstream
        # default branch at run time, with access to OPENAI_API_KEY +
        # GITHUB_TOKEN write scopes. Bump deliberately when reviewing the diff.
        uses: Codium-ai/pr-agent@d82f7d3e696cd00822694aaa3096265d3889f3f1 # v0.34
        env:
          OPENAI_API_KEY: ${{ secrets.PR_AGENT_OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gpt-5.5"
          config.fallback_models: '["gpt-5.4"]'
          # gpt-5.5 / gpt-5.4 aren't in pr-agent v0.34's MAX_TOKENS table, which
          # causes the model call to error out silently (action exits 0, no review
          # posted). 200000 matches gpt-5.5's published context window.
          config.custom_model_max_tokens: "200000"
          pr_reviewer.require_score_label: "false"
          pr_reviewer.enable_review_labels_security: "true"
          pr_reviewer.num_code_suggestions: "5"
          pr_reviewer.extra_instructions: |
            You (GPT-5.5) are one of three independent reviewers on every PR —
            alongside Claude Sonnet 4.6 and the Greptile GitHub App. The reviews
            run with no shared context. Claude is doing a structured pass on
            architecture, security, and the fork-rebase contract. Lean into what
            GPT-5.5 catches well: code-quality patterns, idiomatic concerns,
            tricky edge cases, performance smells, error-handling gaps, and
            anything that doesn't fit a neat category. Don't try to replicate
            Claude's lens — overlap dilutes the value of having multiple models
            on the same diff. Flag what you actually find, not what you expect
            to find.

            Mission Control is an open-source dashboard for AI agent orchestration:
            agent fleet management, task tracking, cost monitoring, workflow
            orchestration. Stack: Next.js 16 (App Router), React 19, TypeScript 5,
            SQLite via better-sqlite3, Tailwind CSS 3, Zustand, pnpm. Three agent
            control surfaces: MCP server, CLI (`pnpm mc`), and REST API (OpenAPI
            in `openapi.json`).

            This repo is a fork of `builderz-labs/mission-control` with a rebase
            contract — fork-only changes live under namespaced extension paths
            (see `FORK.md`, `EXTENSIONS.md`).
